<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kiosko Visitantes</title>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    try{ document.documentElement.dataset.theme = localStorage.getItem("ui_theme") || "dark"; }catch{}
  </script>
  <style>
    :root{ --bg:#0b1220; --panel:#111c33; --text:#e5e7eb; --muted:#94a3b8; --brand:#7c3aed; --ok:#22c55e; --bad:#ef4444; --border:rgba(255,255,255,.10); --font:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; }
    html[data-theme="light"]{ --bg:#f8fafc; --panel:#ffffff; --text:#0f172a; --muted:#64748b; --border:rgba(15,23,42,.14); }
    *{ box-sizing:border-box; }
    body{ margin:0; min-height:100vh; font-family:var(--font); color:var(--text); background:var(--bg); }
    main{ width:min(760px,100%); margin:0 auto; padding:18px 12px 80px; }
    .head{ display:flex; justify-content:space-between; gap:14px; align-items:flex-start; margin:8px 0 14px; }
    .head-actions{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:flex-end; }
    h1{ margin:0; font-size:22px; line-height:1.1; }
    .sub{ color:var(--muted); font-size:13px; margin-top:6px; }
    .badge{ border:1px solid rgba(167,139,250,.45); color:#ddd6fe; border-radius:999px; padding:7px 10px; font-size:12px; white-space:nowrap; background:rgba(124,58,237,.16); }
    .card{ background:linear-gradient(180deg, rgba(17,28,51,.96), rgba(15,23,42,.94)); border:1px solid var(--border); border-radius:14px; padding:14px; box-shadow:0 18px 44px rgba(0,0,0,.35); }
    .grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    label{ display:block; color:var(--muted); font-size:12px; margin:0 0 6px; }
    input, select, textarea{ width:100%; border:1px solid var(--border); background:rgba(2,6,23,.38); color:var(--text); border-radius:12px; padding:11px 12px; outline:none; font:inherit; }
    textarea{ resize:vertical; min-height:82px; }
    button{ width:100%; border:0; border-radius:12px; padding:12px 14px; background:var(--brand); color:white; font-weight:800; cursor:pointer; font:inherit; }
    .theme-btn{ width:auto; padding:7px 10px; background:rgba(148,163,184,.18); color:var(--text); border:1px solid var(--border); font-size:12px; white-space:nowrap; }
    button:disabled{ opacity:.65; cursor:not-allowed; }
    .hint{ color:var(--muted); font-size:12px; line-height:1.35; }
    .divider{ height:1px; background:var(--border); margin:14px 0; }
    .qr-card{ display:none; margin-top:14px; text-align:center; }
    .qr-card.show{ display:block; }
    #qrcode{ display:inline-block; background:white; padding:10px; border-radius:14px; }
    .folio{ color:var(--muted); font-size:12px; margin-top:10px; overflow-wrap:anywhere; }
    .toast{ position:fixed; left:12px; right:12px; bottom:14px; display:none; border-radius:14px; padding:12px; border:1px solid var(--border); background:rgba(17,28,51,.98); color:var(--text); box-shadow:0 18px 44px rgba(0,0,0,.35); }
    .toast.show{ display:block; }
    .toast.ok{ border-color:rgba(34,197,94,.45); }
    .toast.bad{ border-color:rgba(239,68,68,.45); }
    html[data-theme="light"] .card{ background:#ffffff; box-shadow:0 18px 44px rgba(15,23,42,.10); }
    html[data-theme="light"] input,
    html[data-theme="light"] select,
    html[data-theme="light"] textarea{ background:#ffffff; color:var(--text); }
    html[data-theme="light"] .toast{ background:#ffffff; box-shadow:0 18px 44px rgba(15,23,42,.14); }
    @media (max-width:680px){ main{ padding:14px 10px 74px; } .head{ display:grid; } .badge{ width:max-content; } .grid{ grid-template-columns:1fr; } h1{ font-size:20px; } }
  </style>
</head>
<body>
  <main>
    <div class="head">
      <div>
        <h1>Solicitud de visita</h1>
        <div class="sub">Recibiras un QR. El acceso se libera cuando tu anfitrion autorice la visita.</div>
      </div>
      <div class="head-actions">
        <button class="theme-btn" id="btnTheme" type="button">Tema</button>
        <div class="badge">Visitantes</div>
      </div>
    </div>

    <form class="card" id="form">
      <div class="grid">
        <div>
          <label>Nombre visitante *</label>
          <input id="nombreVisitante" autocomplete="name" required>
        </div>
        <div>
          <label>Empresa / procedencia</label>
          <input id="empresa" autocomplete="organization">
        </div>
        <div>
          <label>Telefono</label>
          <input id="telefono" inputmode="tel" autocomplete="tel">
        </div>
        <div>
          <label>Persona a quien visita *</label>
          <select id="persona" required></select>
        </div>
        <div>
          <label>Area *</label>
          <select id="area" required></select>
        </div>
        <div>
          <label>Motivo *</label>
          <select id="motivo" required></select>
        </div>
        <div>
          <label>Fecha y hora solicitada *</label>
          <input id="fechaHora" type="datetime-local" required>
        </div>
      </div>
      <div class="divider"></div>
      <label>Observaciones</label>
      <textarea id="observaciones" placeholder="Datos adicionales para autorizacion"></textarea>
      <div class="divider"></div>
      <p class="hint">Conserva el QR. Si aun no esta autorizado, el guardia vera el aviso al escanear.</p>
      <button id="btnEnviar" type="submit">Enviar y generar QR</button>
    </form>

    <section class="card qr-card" id="qrCard">
      <h2 style="margin:0 0 10px;">QR generado</h2>
      <div id="qrcode"></div>
      <div class="folio" id="folioTxt"></div>
      <p class="hint">Estado inicial: pendiente de autorizacion.</p>
    </section>
  </main>
  <div id="toast" class="toast"></div>

  <script type="module">
    import { AREAS, MOTIVOS, PERSONAS, fillSelect, setupKioskoTheme, toast, crearSolicitudCita } from "./kiosko-common.js";

    setupKioskoTheme();
    fillSelect("persona", PERSONAS);
    fillSelect("area", AREAS);
    fillSelect("motivo", MOTIVOS);

    const form = document.getElementById("form");
    const btn = document.getElementById("btnEnviar");
    const qrCard = document.getElementById("qrCard");
    const qrBox = document.getElementById("qrcode");
    const folioTxt = document.getElementById("folioTxt");

    function renderQR(id){
      qrBox.innerHTML = "";
      new QRCode(qrBox, { text:String(id), width:260, height:260, colorDark:"#111827", colorLight:"#ffffff", correctLevel:QRCode.CorrectLevel.M });
      folioTxt.textContent = `ID: ${id}`;
      qrCard.classList.add("show");
      qrCard.scrollIntoView({ behavior:"smooth", block:"start" });
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = "Enviando...";
      try{
        const nombre = document.getElementById("nombreVisitante").value.trim();
        const cita = await crearSolicitudCita({
          tipoVisita: "visitante",
          tipoAcceso: "visitante",
          nombreVisitante: nombre,
          proveedorCodigo: "",
          proveedor: nombre,
          empresa: document.getElementById("empresa").value.trim() || "Visitante",
          telefono: document.getElementById("telefono").value.trim(),
          personaVisita: document.getElementById("persona").value,
          area: document.getElementById("area").value,
          motivo: document.getElementById("motivo").value,
          fechaHora: document.getElementById("fechaHora").value,
          observacionesKiosko: document.getElementById("observaciones").value.trim(),
          createdBySource: "kiosko_visitantes"
        });
        renderQR(cita.id);
        form.reset();
        toast("Solicitud enviada. QR generado en espera de autorizacion.", "ok");
      }catch(err){
        console.error(err);
        toast(err?.message || "No se pudo enviar la solicitud.", "bad");
      }finally{
        btn.disabled = false;
        btn.textContent = "Enviar y generar QR";
      }
    });
  </script>
</body>
</html>
